<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sunu-Idées | Boîte à idées collaborative</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-lightbulb-fill"></i>
                Sunu-Idées
            </a>

            <span class="badge bg-light text-dark">
                <span id="nombre-idees">0</span> idées
            </span>

        </div>
    </nav>

   <div class="container-fluid py-4">

    <div class="row g-4">

        <!-- COLONNE GAUCHE -->

        <div class="col-lg-4">

            <div class="card shadow-sm border-0 h-100">

                <div class="card-body">

                    <h3 class="mb-4">
                        <i class="bi bi-lightbulb"></i>
                        Nouvelle idée
                    </h3>

                  <form id="formulaire-idee">

    <input type="hidden" id="identifiant-idee">

    <div class="mb-3">
        <label class="form-label">Titre</label>

        <input
            type="text"
            id="titre"
            class="form-control"
            placeholder="Titre de l'idée"
            required>
    </div>

    <div class="mb-3">

        <label class="form-label">Catégorie</label>

        <select
            id="categorie"
            class="form-select"
            required>

            <option value="">
                Choisir...
            </option>

            <option value="pedagogie">
                Pédagogie
            </option>

            <option value="evenement">
                Événement
            </option>

            <option value="campus">
                Vie de campus
            </option>

            <option value="technique">
                Amélioration technique
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <textarea
            id="description"
            class="form-control"
            rows="5"
            placeholder="Décrivez votre idée..."
            required></textarea>

    </div>

    <div class="d-grid gap-2">

        <button
            type="submit"
            id="bouton-enregistrer"
            class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>
            Ajouter l'idée

        </button>

        <button
            type="button"
            id="bouton-annuler"
            class="btn btn-secondary d-none">

            Annuler

        </button>

    </div>

</form>

                </div>

            </div>

        </div>

        <!-- COLONNE DROITE -->

        <div class="col-lg-8">

            <!-- RECHERCHE -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">

                    <div class="row g-3">

                        <div class="col-md-6">

                            <input
                                type="text"
                                id="champ-recherche"
                                class="form-control"
                                placeholder="Rechercher une idée...">

                        </div>

                        <div class="col-md-3">

                            <select
                                id="filtre-categorie"
                                class="form-select">

                                <option value="toutes">
                                    Toutes
                                </option>

                                <option value="pedagogie">
                                    Pédagogie
                                </option>

                                <option value="evenement">
                                    Événement
                                </option>

                                <option value="campus">
                                    Campus
                                </option>

                                <option value="technique">
                                    Technique
                                </option>

                            </select>

                        </div>

                        <div class="col-md-3">

                            <select
                                id="tri"
                                class="form-select">

                                <option value="recent">
                                    Récentes
                                </option>

                                <option value="ancien">
                                    Anciennes
                                </option>

                                <option value="alphabetique">
                                    A-Z
                                </option>

                            </select>

                        </div>

                    </div>

                </div>

            </div>

            

            <!-- LISTE DES IDEES -->

            <div class="row g-4" id="liste-idees">

            </div>

        </div>

    </div>

</div>

    <!-- Toast -->

    <div class="position-fixed bottom-0 end-0 p-3">

        <div
            id="notification"
            class="toast align-items-center text-bg-success border-0">

            <div class="d-flex">

                <div class="toast-body">
                    Action effectuée.
                </div>

                <button
                    type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="js/app.js"></script>

</body>

</html>
